# Controls what types of commands get filtered
filter:
  player-chat-commands: true
  command-blocks: true
  command-block-minecarts: true
  console: false
  normalize-roots-lowercase: true

permissions:
  bypass-usernames: []
  notify: []

# Disables any command starting with these roots.
blocked-roots:
  - stop
  - restart
  - reload
  - rl
  - op
  - deop
  - ban
  - ban-ip
  - kick
  - whitelist
  - kill
  - clear
  - execute
  - function
  - schedule
  - data
  - damage
  - worldborder
  - difficulty
  - gamerule
  - plugins
  - pl

# Disables all commands starting with these namespaces (e.g. any command starting with "minecraft:" will be blocked).
blocked-namespaces:
  - minecraft
  - bukkit
  - spigot
  - paper

# Disables any command containing these selectors.
blocked-selectors:
  - "@e"
  - "@a"
  - "@r"

# Messages are compatible with Minecraft's chat color system (e.g. '&f' makes text white).
messages:
  blocked-player-command: "That command is disabled for camp safety. Ask an instructor if you need help."
  blocked-command-block-nearby: "A command block command near you was blocked for camp safety. Ask an instructor for help."
  blocked-command-block-editor: "A command block you placed or edited tried to run a disabled command. Ask an instructor for help."
  blocked-instructor-notify: "&e[RestrictedOperator]&f Blocked {source} at {location}: Last modified by {player}; reason=[{reason}]; command=&7{command}"

notifications:
  notify-instructors: true
  notify-nearby-players: false
  notify-last-known-editor: true
  nearby-radius-blocks: 64
  cooldown-seconds-per-source: 10

# Days to retain command block editor tracking records before pruning
attribution:
  tracking-prune-interval-days: 7

# Log blocked commands to the server log, including source, reason, matched pattern, and command text
logging:
  log-blocked-commands: true
