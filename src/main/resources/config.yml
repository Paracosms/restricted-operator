filter:
  player-chat-commands: true
  command-blocks: true
  command-block-minecarts: true
  console: false
  other-non-player-senders: true
  normalize-roots-lowercase: true

bypass-usernames: []

blocked-roots:
  - stop
  - restart
  - reload
  - rl
  - op
  - deop
  - ban
  - ban-ip
  - kick
  - whitelist
  - kill
  - clear
  - execute
  - function
  - data
  - damage
  - worldborder
  - difficulty
  - gamerule
  - plugins
  - pl
  - minecraft:kill
  - bukkit:reload
  - paper:restart
  - paper

blocked-selectors:
  - "@e"
  - "@a"
  - "@r"

messages:
  blocked-player-command: "That command is disabled for camp safety. Ask an instructor if you need help."
  blocked-command-block-nearby: "A command block command near you was blocked for camp safety. Ask an instructor for help."
  blocked-command-block-editor: "A command block you placed or edited tried to run a disabled command. Ask an instructor for help."
  blocked-instructor-notify: "&e[RestrictedOperator]&f Blocked {source} at {location}: {reason}; command=&7{command}"

notifications:
  notify-instructors: true
  notify-nearby-players: true
  nearby-radius-blocks: 16
  cooldown-seconds-per-source: 10

logging:
  log-blocked-commands: true
