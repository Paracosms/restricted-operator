name: RestrictedOperator
version: 1.0.0
main: io.papermc.restrictedOperator.RestrictedOperatorPlugin
api-version: "1.21"
authors: ["Paracosms"]
description: Restricts unsafe commands and command blocks for operators.

permissions:
  restrictedoperator.bypass-users:
    description: Bypass command safety filtering and trust command blocks.
    default: false
  restrictedoperator.notify:
    description: Receive blocked command notifications.
    default: false